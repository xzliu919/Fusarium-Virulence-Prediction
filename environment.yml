name: fusarium-virulence-prediction
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - pip>=21.0
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  - joblib>=1.1.0
  - pytorch>=1.10.0
  - torchvision>=0.11.0
  - torchaudio>=0.10.0
  - transformers>=4.20.0
  - torchinfo>=1.5.0
  - biopython>=1.79
  - h5py>=3.6.0
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  - openpyxl>=3.0.0
  - python-openpyxl>=3.0.0
  - tensorflow>=2.8.0
  - imbalanced-learn>=0.9.0
  - permetrics>=1.3.0
  - pip:
    - tabulate>=0.8.9
    - seqeval>=1.2.2
    - torchtext>=0.12.0
    - einops>=0.4.0

variables:
  CUDA_VISIBLE_DEVICES: "0"
  OMP_NUM_THREADS: "8"
