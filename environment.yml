name: fusarium-virulence-prediction
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python>=3.9
  - pip>=21.0

  # Data Processing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0

  # Machine Learning & Statistics
  - scikit-learn>=1.0.0
  - joblib>=1.1.0

  # Deep Learning (PyTorch)
  - pytorch>=1.10.0
  - torchvision>=0.11.0
  - torchaudio>=0.10.0

  # Transformers & ESM-2
  - transformers>=4.20.0
  - torchinfo>=1.5.0

  # Bioinformatics
  - biopython>=1.79

  # HDF5 Support
  - h5py>=3.6.0

  # Visualization (optional)
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

  # Additional utilities
  - openpyxl>=3.0.0
  - python-openpyxl>=3.0.0

  # TensorFlow (for ResGS model)
  - tensorflow>=2.8.0

  # Imbalanced learning (for PNNGS)
  - imbalanced-learn>=0.9.0

  # Permetrics (for PNNGS evaluation)
  - permetrics>=1.3.0

  # pip-installed packages
  - pip:
    - tabulate>=0.8.9
    - seqeval>=1.2.2
    - torchtext>=0.12.0
    -einops>=0.4.0

variables:
  CUDA_VISIBLE_DEVICES: "0"
  OMP_NUM_THREADS: "8"